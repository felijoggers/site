<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineShock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">CINE<span>SHOCK</span></div>

        <nav>
            <a href="#">Início</a>
            <a href="#">Filmes</a>
            <a href="#">Séries</a>
            <a href="#">Lançamentos</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <section class="banner">
        <div class="banner-content">
            <h1>Os Melhores Filmes em Um Só Lugar</h1>
            <p>Assista aos maiores sucessos do cinema com qualidade máxima.</p>
            <button>Explorar Agora</button>
        </div>
    </section>

    <section class="filmes">
        <h2>Destaques</h2>

        <div class="grid-filmes">

            <div class="card">
                <img src="https://picsum.photos/300/450?random=1" alt="Filme">
                <h3>Filme de Ação</h3>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/450?random=2" alt="Filme">
                <h3>Ficção Científica</h3>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/450?random=3" alt="Filme">
                <h3>Terror</h3>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/450?random=4" alt="Filme">
                <h3>Romance</h3>
            </div>

        </div>
    </section>

    <footer>
        <p>© 2025 CineShock - Todos os direitos reservados.</p>
    </footer>

</body>
</html>
