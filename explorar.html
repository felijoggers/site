<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="explorar.css">
</head>
<body>
    <header>
        <div class="logo">CINE<span>SHOCK</span></div>

   
    <nav>
        <a href="#">
    <input type="text" id="pesquisa" placeholder="Digite um filme">

    <div id="resultado"></div>
    
    <script>
        const campo = document.getElementById("pesquisa");
        const resultado = document.getElementById("resultado");

        campo.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                resultado.innerHTML = `
                    <h3>Resultado da pesquisa:</h3>
                    <p>${campo.value}</p>
                `;
            }
        });
    </script>
    </a>
    </nav>
 </header>
</body>
</html>
